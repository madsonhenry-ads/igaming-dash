version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dashigaming
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: dashigaming
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dashigaming"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "16379:6379"
    volumes:
      - redis_data:/data

  dashboard:
    build:
      context: ../../dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://dashigaming:${POSTGRES_PASSWORD:-changeme}@postgres:5432/dashigaming
      REDIS_URL: redis://redis:6379
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-changeme}
      JWT_SECRET: ${JWT_SECRET:-changeme}
      EVOLUTION_API_URL: http://evolution-api:8080
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY:-changeme}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ../../dashboard:/app
      - /app/node_modules
      - /app/.next

  postback:
    build:
      context: ../../services/postback
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://dashigaming:${POSTGRES_PASSWORD:-changeme}@postgres:5432/dashigaming
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-changeme}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-changeme}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ../../services/postback:/app
      - /app/node_modules

  whatsapp:
    build:
      context: ../../services/whatsapp
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
    environment:
      EVOLUTION_API_URL: http://evolution-api:8080
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY:-changeme}
      DATABASE_URL: postgresql://dashigaming:${POSTGRES_PASSWORD:-changeme}@postgres:5432/dashigaming
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      evolution-api:
        condition: service_started
    volumes:
      - ../../services/whatsapp:/app
      - /app/node_modules

  evolution-api:
    image: evolution/api:latest
    ports:
      - "8080:8080"
    environment:
      SERVER_URL: http://localhost:8080
      AUTHENTICATION_TYPE: apikey
      API_KEY: ${EVOLUTION_API_KEY:-changeme}
    volumes:
      - evolution_data:/evolution/instances

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - dashboard
      - postback
      - whatsapp

volumes:
  postgres_data:
  redis_data:
  evolution_data:
